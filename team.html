<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Team — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=31"></script>
<link rel="stylesheet" href="assets/styles.css?v=31">
<script src="assets/panda.js?v=31"></script>
</head>
<body>
<div class="app has-nav">
  <div class="sticky-head px-5 pt-5 pb-3 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <a href="profile.html" class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 shrink-0"><i data-icon="arrow-left" class="w-4.5 h-4.5"></i></a>
      <h1 class="text-xl font-bold text-navy-800 tracking-tight flex-1">Team Members</h1>
    </div>
  </div>

  <div class="app-scroll bg-gray-50 px-4 pt-4 pb-28">
    <div class="space-y-3" id="list"></div>
    <button id="addMemberBtn" class="mt-3 btn w-full h-12 rounded-xl border-2 border-dashed border-gray-300 text-navy-800 font-semibold flex items-center justify-center gap-2 hover:bg-gray-50 bg-white">
      <i data-icon="user-plus" class="w-4.5 h-4.5"></i>Добавить участника
    </button>
  </div>

  <div id="sheet" class="sheet-overlay">
    <div class="sheet">
      <div class="sheet-head">
        <div><h2 id="s-title" class="text-lg font-bold text-navy-800">—</h2><p id="s-sub" class="text-xs text-gray-400 mt-0.5 hidden"></p></div>
        <button data-close class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50"><i data-icon="close" class="w-5 h-5"></i></button>
      </div>
      <div class="sheet-body" id="s-body"></div>
      <div class="sheet-foot" id="s-foot"></div>
    </div>
  </div>
</div>

<script>
  const ROLES={owner:'Owner',manager:'Manager',dispatcher:'Диспетчер',accountant:'Бухгалтер',logist:'Логист'};
  const ROLE_STYLE={
    owner:     {cls:'bg-primary-100 text-navy-800', dot:'#FFCB00'},
    manager:   {cls:'bg-blue-50 text-blue-700',     dot:'#2E90FA'},
    dispatcher:{cls:'bg-success-50 text-success-700',dot:'#17B26A'},
    accountant:{cls:'bg-purple-50 text-purple-700', dot:'#7C3AED'},
    logist:    {cls:'bg-warning-50 text-warning-700',dot:'#F79009'},
  };

  const members=[
    {id:1,name:'Jamshid Turaev',  role:'owner',      phone:'+998 90 100 11 22',img:'assets/img/drivers/d1.jpg',creds:null},
    {id:2,name:'Dilnoza Usmanova',role:'manager',    phone:'+998 91 200 33 44',img:'assets/img/drivers/d5.jpg',creds:null},
    {id:3,name:'Aziz Xolmatov',   role:'dispatcher', phone:'+998 93 300 55 66',img:'assets/img/drivers/d4.jpg',creds:{login:'aziz.xolmatov',pass:'Dp7!qK3m',active:true}},
    {id:4,name:'Malika Rahimova', role:'accountant', phone:'+998 94 400 77 88',img:'assets/img/drivers/d3.jpg',creds:null},
    {id:5,name:'Rustam Nazarov',  role:'logist',     phone:'+998 99 500 99 00',img:'assets/img/drivers/d2.jpg',creds:null},
  ];

  function genLogin(name){
    const p=name.toLowerCase().split(' ');
    return (p[0]||'user')+'.'+(p[1]||'user');
  }
  function genPass(){
    const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$';
    let s='';for(let i=0;i<12;i++)s+=c[Math.floor(Math.random()*c.length)];return s;
  }

  const COPY_SVG=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`;
  const EYE_SVG=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const EYEOFF_SVG=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

  function renderList(){
    document.getElementById('list').innerHTML=members.map((m,i)=>{
      const r=ROLE_STYLE[m.role]||ROLE_STYLE.logist;
      const has=m.creds&&m.creds.active;
      return `
      <div class="rounded-2xl bg-white border border-gray-200 shadow-xs overflow-hidden">
        <div class="flex items-center gap-3 p-3.5">
          <img src="${m.img}" class="w-12 h-12 rounded-full object-cover shrink-0">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <p class="text-[15px] font-bold text-navy-800">${m.name}</p>
              <span class="inline-flex items-center gap-1 ${r.cls} text-[10px] font-semibold px-2 py-0.5 rounded-full"><span style="width:5px;height:5px;border-radius:50%;background:${r.dot};display:inline-block"></span>${ROLES[m.role]}</span>
            </div>
            <p class="text-[12px] text-gray-500 mt-0.5">${m.phone}</p>
          </div>
        </div>
        <div class="border-t border-gray-100 px-3.5 py-2.5 flex items-center justify-between gap-2">
          <div class="flex items-center gap-1.5 min-w-0">
            <i data-icon="monitor-smartphone" class="w-4 h-4 text-gray-400 shrink-0"></i>
            <span class="text-[12px] text-gray-500 font-medium shrink-0">Web Admin</span>
            ${has
              ? '<span class="inline-flex items-center gap-1 bg-success-50 text-success-700 text-[10px] font-semibold px-2 py-0.5 rounded-full ml-1"><span style="width:5px;height:5px;border-radius:50%;background:#17B26A;display:inline-block"></span>Активен</span>'
              : '<span class="text-[11px] text-gray-400 ml-1">Нет доступа</span>'}
          </div>
          <button data-member="${i}" class="creds-btn shrink-0 inline-flex items-center gap-1.5 px-3 h-8 rounded-lg text-[12px] font-semibold ${has?'border border-gray-200 text-gray-600 bg-white hover:bg-gray-50':'text-navy-800 hover:opacity-90'}" ${has?'':'style="background:#FFCB00"'}>
            <i data-icon="${has?'lock':'shield-check'}" class="w-3.5 h-3.5"></i>${has?'Данные входа':'Выдать доступ'}
          </button>
        </div>
      </div>`;
    }).join('');
    Panda.render();
    document.querySelectorAll('.creds-btn').forEach(btn=>btn.addEventListener('click',()=>openCredsSheet(+btn.dataset.member)));
  }

  const ov=document.getElementById('sheet'),sBody=document.getElementById('s-body'),sFoot=document.getElementById('s-foot'),sTitle=document.getElementById('s-title'),sSub=document.getElementById('s-sub');
  function openSheet(t,b,f,sub){
    sTitle.textContent=t;
    if(sub){sSub.textContent=sub;sSub.classList.remove('hidden');}else{sSub.classList.add('hidden');}
    sBody.innerHTML=b;sFoot.innerHTML=f||'';Panda.render();ov.classList.add('open');
    sFoot.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>ov.classList.remove('open')));
  }
  function closeSheet(){ov.classList.remove('open');}
  ov.addEventListener('click',e=>{if(e.target===ov)closeSheet();});
  ov.querySelector('[data-close]').addEventListener('click',closeSheet);

  function memberHeader(m){
    return `<div style="display:flex;align-items:center;gap:12px;background:#F9FAFB;border-radius:14px;padding:14px;margin-bottom:20px">
      <img src="${m.img}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0">
      <div>
        <p style="font-size:15px;font-weight:700;color:#0F0F37">${m.name}</p>
        <p style="font-size:12px;color:#667085;margin-top:3px">${ROLES[m.role]}</p>
      </div>
    </div>`;
  }

  function credRow(label,id,value,masked){
    const display=masked?'●'.repeat(value.length):value;
    return `<div style="margin-bottom:16px">
      <p style="font-size:10px;font-weight:700;color:#667085;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">${label}</p>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="${id}" data-val="${value}" data-masked="${masked?'1':'0'}" style="flex:1;background:#F9FAFB;border:1.5px solid #EAECF0;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:700;color:#0F0F37;font-family:monospace;letter-spacing:.05em;min-height:46px;word-break:break-all">${display}</div>
        ${masked?`<button onclick="togglePass('${id}')" style="width:40px;height:40px;border-radius:12px;border:1.5px solid #EAECF0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#98A2B3">${EYEOFF_SVG}</button>`:''}
        <button onclick="copyVal('${id}')" style="width:40px;height:40px;border-radius:12px;border:1.5px solid #EAECF0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#98A2B3">${COPY_SVG}</button>
      </div>
    </div>`;
  }

  function openCredsSheet(idx){
    const m=members[idx];
    const has=m.creds&&m.creds.active;

    if(has){
      // VIEW existing credentials
      openSheet('Данные входа',
        memberHeader(m)+
        `<p style="font-size:12px;color:#667085;margin-bottom:16px;line-height:1.5">Сотрудник имеет доступ в Web Admin панель. Ниже его текущие данные для входа.</p>`+
        credRow('Логин (Email)','cred-login',m.creds.login,false)+
        credRow('Пароль','cred-pass',m.creds.pass,true)+
        `<div style="height:1px;background:#F2F4F7;margin:4px 0 16px"></div>
        <button id="change-pass-btn" style="width:100%;height:44px;border-radius:12px;border:1.5px solid #EAECF0;background:#fff;font-size:14px;font-weight:700;color:#344054;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
          <i data-icon="rotate-ccw" style="width:16px;height:16px"></i>Сменить пароль
        </button>`,
        `<button id="revoke-btn" class="btn flex-1 h-12 rounded-lg text-error-600 font-bold border border-error-200 bg-error-50">Отозвать доступ</button>
         <button data-close class="btn flex-1 h-12 rounded-xl font-bold text-navy-800" style="background:#FFCB00">Закрыть</button>`,
        m.name);

      setTimeout(()=>{
        Panda.render();
        document.getElementById('change-pass-btn').addEventListener('click',()=>{
          const newPass=genPass();
          const el=document.getElementById('cred-pass');
          el.dataset.val=newPass;
          members[idx].creds.pass=newPass;
          el.dataset.masked='1';
          el.textContent='●'.repeat(newPass.length);
          document.getElementById('change-pass-btn').textContent='✓ Новый пароль сохранён';
          document.getElementById('change-pass-btn').style.color='#17B26A';
          document.getElementById('change-pass-btn').style.borderColor='#6CE9A6';
          document.getElementById('change-pass-btn').style.background='#ECFDF5';
          document.getElementById('change-pass-btn').disabled=true;
        });
        document.getElementById('revoke-btn').addEventListener('click',()=>{
          if(confirm('Отозвать доступ у '+m.name+'?')){
            members[idx].creds=null;
            renderList(); closeSheet();
          }
        });
      },30);

    } else {
      // GRANT new access
      const emptyRow=(label,id)=>`
        <div style="margin-bottom:16px">
          <p style="font-size:10px;font-weight:700;color:#667085;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">${label}</p>
          <div style="display:flex;align-items:center;gap:8px">
            <div id="${id}" style="flex:1;background:#F9FAFB;border:1.5px solid #EAECF0;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:700;color:#98A2B3;font-family:monospace;letter-spacing:.03em;min-height:46px">—</div>
            <button onclick="copyVal('${id}')" style="width:40px;height:40px;border-radius:12px;border:1.5px solid #EAECF0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#D0D5DD">${COPY_SVG}</button>
          </div>
        </div>`;

      openSheet('Выдать доступ',
        memberHeader(m)+
        emptyRow('Логин (Email)','cred-login')+
        emptyRow('Пароль','cred-pass')+
        `<button id="gen-btn" style="width:100%;height:48px;border-radius:14px;background:#FFCB00;border:none;font-size:15px;font-weight:800;color:#0F0F37;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
          <i data-icon="rotate-ccw" style="width:18px;height:18px"></i>Сгенерировать логин и пароль
        </button>`,
        `<button data-close class="btn flex-1 h-12 rounded-lg border border-gray-300 text-navy-800 font-bold">Отмена</button>
         <button id="save-creds" class="btn flex-1 h-12 rounded-xl font-bold text-navy-800" style="background:#FFCB00;opacity:0.35;pointer-events:none" disabled>Выдать доступ</button>`,
        m.name);

      setTimeout(()=>{
        Panda.render();
        const saveBtn=document.getElementById('save-creds');
        document.getElementById('gen-btn').addEventListener('click',()=>{
          const l=genLogin(m.name), p=genPass();
          const loginEl=document.getElementById('cred-login');
          const passEl=document.getElementById('cred-pass');
          loginEl.textContent=l; loginEl.style.color='#0F0F37';
          passEl.textContent=p;  passEl.style.color='#0F0F37';
          saveBtn.disabled=false; saveBtn.style.opacity='1'; saveBtn.style.pointerEvents='auto';
        });
        saveBtn.addEventListener('click',()=>{
          const l=document.getElementById('cred-login').textContent;
          const p=document.getElementById('cred-pass').textContent;
          if(l==='—'||p==='—') return;
          members[idx].creds={login:l,pass:p,active:true};
          renderList(); closeSheet();
        });
      },30);
    }
  }

  window.copyVal=function(id){
    const el=document.getElementById(id);
    const txt=el.dataset.val||el.textContent;
    navigator.clipboard.writeText(txt).then(()=>{
      const orig=el.textContent; el.textContent='Скопировано!'; el.style.color='#17B26A';
      setTimeout(()=>{el.textContent=orig;el.style.color='';},1500);
    }).catch(()=>{});
  };

  window.togglePass=function(id){
    const el=document.getElementById(id);
    const masked=el.dataset.masked==='1';
    el.dataset.masked=masked?'0':'1';
    el.textContent=masked?el.dataset.val:'●'.repeat(el.dataset.val.length);
    const btn=el.parentElement.querySelector('button');
    btn.innerHTML=masked?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  };

  document.getElementById('addMemberBtn').addEventListener('click',()=>{
    openSheet('Добавить участника',
      `<div class="space-y-4">
        <div class="rounded-2xl bg-gray-50 p-4 flex items-center gap-4">
          <span class="w-14 h-14 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 shrink-0"><i data-icon="user" class="w-7 h-7"></i></span>
          <label class="inline-flex h-9 px-4 rounded-lg border border-gray-300 text-sm font-semibold text-navy-800 bg-white items-center cursor-pointer hover:bg-gray-50">Фото<input type="file" accept="image/*" class="hidden"></label>
        </div>
        <div><label class="f-label">Имя и фамилия</label><input id="nm-name" class="f-field" placeholder="напр. Алишер Каримов"></div>
        <div><label class="f-label">Телефон</label><div class="f-plate"><span class="seg">UZ +998</span><input id="nm-phone" inputmode="numeric" placeholder="90 123 45 67"></div></div>
        <div><label class="f-label">Роль</label><div class="f-sel"><select id="nm-role" class="f-field"><option value="manager">Manager</option><option value="dispatcher">Диспетчер</option><option value="accountant">Бухгалтер</option><option value="logist">Логист</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
      </div>`,
      `<button data-close class="btn flex-1 h-12 rounded-lg border border-gray-300 text-navy-800 font-bold">Отмена</button>
       <button id="add-save" class="btn flex-1 h-12 rounded-xl font-bold text-navy-800" style="background:#FFCB00">Добавить</button>`);
    setTimeout(()=>{
      document.getElementById('add-save').addEventListener('click',()=>{
        const name=document.getElementById('nm-name').value.trim()||'Новый участник';
        const phone='+998 '+document.getElementById('nm-phone').value;
        const role=document.getElementById('nm-role').value;
        members.push({id:Date.now(),name,role,phone,img:'assets/img/drivers/d4.jpg',creds:null});
        renderList(); closeSheet();
      });
    },30);
  });

  renderList();
  Panda.mountNav('profile');
</script>
</body>
</html>
