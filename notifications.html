<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=23"></script>
<link rel="stylesheet" href="assets/styles.css?v=23">
<script src="assets/panda.js?v=23"></script>
</head>
<body>
<div class="app">
  <div class="sticky-head px-5 py-3 flex items-center gap-3 border-b border-gray-100">
    <a href="fleet.html" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50"><i data-icon="arrow-left" class="w-5 h-5"></i></a>
    <h1 class="text-lg font-bold text-navy-800">Notifications</h1>
    <button class="ml-auto text-xs font-semibold text-navy-700">Mark all read</button>
  </div>

  <div class="app-scroll bg-gray-50 px-4 py-4" id="feed"></div>
</div>

<script>
  const TYPE={
    success:{bg:'bg-success-50',fg:'text-success-600',icon:'check'},
    warning:{bg:'bg-warning-50',fg:'text-warning-600',icon:'clock'},
    error:{bg:'bg-error-50',fg:'text-error-600',icon:'x'},
    info:{bg:'bg-blue-50',fg:'text-blue-600',icon:'badge-check'},
  };
  const groups=[
    {date:'06/17/2026', items:[
      {t:'info',title:'Рейс начат · Алишер Каримов',time:'15:42',body:'VOLVO FH 12 выехал по маршруту Ташкент → Самарканд. Расстояние 350 км.'},
      {t:'info',title:'Рейс начат · Bakhtiyor Yuldashev',time:'15:10',body:'Scania R500 выехал по маршруту Самарканд → Алматы. Расстояние 860 км.'},
      {t:'success',title:'Рейс завершён · Jasur Ergashev',time:'14:20',body:'Renault T High завершил рейс Tashkent → Prague. Прибыль $2 820.'},
      {t:'warning',title:'Document expiring',time:'11:52',body:'Insurance for Volvo FH16 expires in 28 days. Renew it on time.'},
      {t:'error',title:'GPS signal lost',time:'10:08',body:'No GPS data from Scania R500 for over 2 hours.'},
      {t:'info',title:'New feature',time:'07:15',body:'You can now add trailers and assign them right from Garage.'},
    ]},
    {date:'06/16/2026', items:[
      {t:'warning',title:'Subscription ending',time:'18:40',body:'Your Fleet Pro plan ends in 7 days. Renew to keep full access.'},
      {t:'success',title:'Repair completed',time:'13:05',body:'MAN TGX is back in service after maintenance.'},
      {t:'info',title:'Driver assigned',time:'09:22',body:'Sardor Kholmatov was assigned to Mercedes Actros.'},
    ]},
    {date:'06/15/2026', items:[
      {t:'error',title:'Document expired',time:'16:11',body:'Insurance for Kogel trailer (60 H 545 AA) expired 3 days ago.'},
      {t:'success',title:'Payment accepted',time:'12:00',body:'We received your $79 subscription payment. Thank you!'},
      {t:'info',title:'App update',time:'08:45',body:'A new version is available with faster maps and analytics.'},
    ]},
  ];
  document.getElementById('feed').innerHTML = groups.map(g=>`
    <p class="text-sm font-bold text-navy-800 mt-2 mb-2.5 px-1">${g.date}</p>
    <div class="space-y-2.5 mb-4">
      ${g.items.map(n=>{const s=TYPE[n.t];return `
        <div class="rounded-2xl bg-white border border-gray-100 shadow-xs p-3.5 flex gap-3">
          <span class="w-10 h-10 rounded-full ${s.bg} ${s.fg} flex items-center justify-center shrink-0"><i data-icon="${s.icon}" class="w-5 h-5"></i></span>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2">
              <h3 class="text-[15px] font-bold text-navy-800">${n.title}</h3>
              <span class="text-xs text-gray-400 shrink-0">${n.time}</span>
            </div>
            <p class="text-[13px] text-gray-500 mt-0.5 leading-snug">${n.body}</p>
          </div>
        </div>`;}).join('')}
    </div>`).join('');
  Panda.render();
</script>
</body>
</html>
