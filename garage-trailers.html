<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage · Trailers — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=23"></script>
<link rel="stylesheet" href="assets/styles.css?v=23">
<script src="assets/panda.js?v=23"></script>
</head>
<body>
<div class="app has-nav">
  <div class="sticky-head px-5 pt-5 border-b border-gray-100">
    <div class="relative flex items-center justify-between mb-3">
      <h1 class="text-2xl font-bold text-navy-800 tracking-tight">Garage</h1>
      <button id="searchBtn" class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50"><i data-icon="search" class="w-5 h-5"></i></button>
      <div id="searchExpand" class="absolute inset-y-0 right-0 bg-white flex items-center" style="width:0;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1)">
        <div class="flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-3.5 h-10 w-full shadow-xs">
          <i data-icon="search" class="w-5 h-5 text-gray-400 shrink-0"></i>
          <input id="searchInput" class="flex-1 min-w-0 outline-none text-[15px] text-navy-800 placeholder:text-gray-400" placeholder="Search trailers">
          <button id="searchClose" class="text-gray-400 shrink-0"><i data-icon="x" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
    <div class="flex bg-gray-100 rounded-lg p-1 mb-3">
      <a href="garage-trucks.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md text-gray-500">Trucks</a>
      <a href="garage-drivers.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md text-gray-500">Drivers</a>
      <a href="garage-trailers.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md bg-white text-navy-800 shadow-xs">Trailers</a>
    </div>
    <div class="flex gap-2 pb-3 overflow-x-auto hide-scroll" data-tabs>
      <button class="seg-tab on">All 26</button>
      <button class="seg-tab">On trip 12</button>
      <button class="seg-tab">Idle 11</button>
      <button class="seg-tab">Repair 3</button>
    </div>
  </div>

  <div class="app-scroll bg-gray-50 px-4 pt-4 pb-28"><div class="space-y-3" id="list"></div></div>
  <a href="#" id="addBtn" class="fab-add"><i data-icon="plus"></i>Add trailer</a>

  <!-- Add Trailer modal -->
  <div id="sheet" class="sheet-overlay">
    <div class="sheet">
      <div class="sheet-head">
        <h2 class="text-lg font-bold text-navy-800">Add Trailer</h2>
        <button data-close class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50"><i data-icon="close" class="w-5 h-5"></i></button>
      </div>
      <div class="sheet-body space-y-4">
        <label class="dropzone">
          <span class="w-11 h-11 rounded-xl bg-white border border-primary-200 flex items-center justify-center text-navy-700"><i data-icon="upload" class="w-5 h-5"></i></span>
          <span class="text-sm font-semibold text-navy-800 mt-1">Upload trailer photo</span>
          <span class="text-xs text-gray-400">PNG or JPG · max 10 MB</span>
          <input type="file" accept="image/*" class="hidden">
        </label>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="f-label">Brand</label><div class="f-sel"><select class="f-field"><option>Schmitz</option><option>Kogel</option><option>Krone</option><option>Wielton</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
          <div><label class="f-label">Model</label><input class="f-field" placeholder="e.g. Cargobull S.KO"></div>
        </div>
        <div><label class="f-label">License plate</label><div class="f-plate"><span class="seg">UZ</span><input placeholder="60 H 545 AA"></div></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="f-label">Type</label><div class="f-sel"><select class="f-field"><option>Tent (tarpaulin)</option><option>Refrigerator</option><option>Container</option><option>Tipper</option><option>Tanker</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
          <div><label class="f-label">Axles</label><div class="f-sel"><select class="f-field"><option>2 axles</option><option>3 axles</option><option>4 axles</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="f-label">Capacity (kg)</label><input class="f-field" inputmode="numeric" placeholder="e.g. 24,000"></div>
          <div><label class="f-label">Year</label><div class="f-sel"><select class="f-field"><option>2025</option><option>2024</option><option>2023</option><option>2022</option><option>2021</option><option>2020</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
        </div>
        <div><label class="f-label">Assign to truck</label><div class="f-sel"><select class="f-field"><option>— Not assigned —</option><option>DAF XF 105</option><option>Volvo FH16</option><option>MAN TGX</option><option>Scania R500</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
      </div>
      <div class="sheet-foot">
        <button data-close class="btn flex-1 h-12 rounded-lg border border-gray-300 text-navy-800 font-bold hover:bg-gray-50">Cancel</button>
        <button data-close class="btn flex-1 h-12 rounded-lg bg-primary-500 hover:bg-primary-400 text-navy-800 font-bold shadow-sm">Add Trailer</button>
      </div>
    </div>
  </div>
</div>

<script>
  const ST={trip:{label:'On trip',dot:'#17B26A',cls:'bg-success-50 text-success-700'},waiting:{label:'Idle',dot:'#2E90FA',cls:'bg-blue-50 text-blue-700'},repair:{label:'Repair',dot:'#F79009',cls:'bg-warning-50 text-warning-700'}};
  const trailers=[
    {brand:'Schmitz',model:'Cargobull S.KO',plate:'60 H 545 AA',truck:'Volvo FH16',st:'trip',img:'trailer1'},
    {brand:'Kogel',model:'Cargo Coil',plate:'60 H 457 AA',truck:'DAF XF 105',st:'trip',img:'trailer2'},
    {brand:'Krone',model:'Profi Liner',plate:'75 A 112 BC',truck:'MAN TGX',st:'repair',img:'trailer3'},
    {brand:'Schmitz',model:'S.CS Universal',plate:'90 K 330 AA',truck:null,st:'waiting',img:'trailer4'},
  ];
  document.getElementById('list').innerHTML = trailers.map(t=>{
    const s=ST[t.st];
    const truck=t.truck
      ? `<div class="flex items-center gap-1.5 text-[13px] text-gray-600"><i data-icon="truck" class="w-4 h-4 text-gray-400"></i>${t.truck}</div>`
      : `<div class="flex items-center gap-1.5 text-[13px] text-gray-400"><i data-icon="truck" class="w-4 h-4"></i>No truck</div>`;
    return `
    <a href="trailer-detail.html" class="card-press block rounded-2xl bg-white border border-gray-200 shadow-xs p-3">
      <div class="flex gap-3">
        <img src="assets/img/trailers/${t.img}.jpg" class="w-20 h-20 rounded-xl object-cover shrink-0">
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <div><p class="text-[11px] font-medium text-gray-400">${t.brand}</p><h3 class="text-[15px] font-bold text-navy-800">${t.model}</h3></div>
            <span class="inline-flex items-center gap-1.5 ${s.cls} text-[11px] font-semibold px-2 py-1 rounded-full shrink-0"><span class="dot" style="background:${s.dot}"></span>${s.label}</span>
          </div>
          <div class="mt-1.5"><span class="plate"><span class="uz">UZ</span><span class="num">${t.plate}</span></span></div>
          <div class="mt-2">${truck}</div>
        </div>
      </div>
    </a>`;
  }).join('');
  const sx=document.getElementById('searchExpand');
  document.getElementById('searchBtn').addEventListener('click',()=>{const row=sx.parentElement,t=row.querySelector('h1');sx.style.width=(row.clientWidth-t.offsetWidth-12)+'px';setTimeout(()=>document.getElementById('searchInput').focus(),150);});
  document.getElementById('searchClose').addEventListener('click',()=>{sx.style.width='0';document.getElementById('searchInput').value='';});

  Panda.mountNav('garage');
  Panda.render();

  const ov=document.getElementById('sheet');
  document.getElementById('addBtn').addEventListener('click',e=>{e.preventDefault();ov.classList.add('open');});
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');});
  ov.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>ov.classList.remove('open')));
</script>
</body>
</html>
