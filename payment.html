<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=23"></script>
<link rel="stylesheet" href="assets/styles.css?v=23">
<script src="assets/panda.js?v=23"></script>
</head>
<body>
<div class="app">
  <div class="sticky-head px-5 py-3 flex items-center gap-3 border-b border-gray-100">
    <a href="plans.html" class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50"><i data-icon="arrow-left" class="w-5 h-5"></i></a>
    <h1 class="text-base font-semibold text-navy-800">Payment</h1>
  </div>

  <div class="app-scroll px-5 py-5">
    <div class="rounded-2xl bg-primary-50 border border-primary-200 p-4 mb-6 flex items-center justify-between">
      <div><p class="text-sm text-navy-800 font-semibold">Professional</p><p class="text-xs text-navy-500">Subscription · 1 month</p></div>
      <span class="text-2xl font-bold text-navy-800">$79</span>
    </div>

    <h3 class="text-sm font-semibold text-navy-800 mb-3">Payment method</h3>
    <div class="space-y-2.5">
      <label class="pay selected"><span class="logo" style="background:#0098EB">Click</span><span class="name">Click</span><span class="radio on"></span></label>
      <label class="pay"><span class="logo" style="background:#21AC5C">Payme</span><span class="name">Payme</span><span class="radio"></span></label>
      <label class="pay"><span class="logo" style="background:#7000FF">Uzum</span><span class="name">Uzum Bank</span><span class="radio"></span></label>
    </div>
    <p class="text-xs text-gray-400 mt-3">You'll be redirected to the selected provider to complete the payment securely.</p>
  </div>

  <div class="px-5 pt-3 pb-7 border-t border-gray-100">
    <a href="fleet.html" class="btn h-12 rounded-lg bg-primary-500 hover:bg-primary-400 text-navy-800 font-bold flex items-center justify-center shadow-sm gap-2"><i data-icon="lock" class="w-4 h-4"></i> Pay $79</a>
    <p class="text-center text-gray-400 text-xs mt-3">Subscription activates automatically after payment</p>
  </div>
</div>
<style>
  .field{ width:100%; height:48px; padding:0 14px; border:1px solid #D0D5DD; border-radius:8px; font-size:15px; color:#0F0F37; outline:none; box-shadow:0 1px 2px rgba(16,24,40,.05); background:#fff; }
  .field:focus{ border-color:#FFCB00; box-shadow:0 0 0 4px rgba(255,203,0,.3); }
  .pay{ display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid #EAECF0; border-radius:12px; cursor:pointer; transition:.15s; background:#fff; }
  .pay.selected{ border-color:#FFCB00; box-shadow:0 0 0 4px rgba(255,203,0,.2); background:#FFFDF2; }
  .pay .logo{ width:44px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:700; }
  .pay .name{ flex:1; font-size:15px; font-weight:600; color:#0F0F37; }
  .pay .radio{ width:20px; height:20px; border-radius:50%; border:1.5px solid #D0D5DD; }
  .pay .radio.on{ border:6px solid #FFCB00; }
</style>
<script>
  Panda.render();
  document.querySelectorAll('.pay').forEach(p=>p.addEventListener('click',()=>{
    document.querySelectorAll('.pay').forEach(x=>{x.classList.remove('selected');x.querySelector('.radio').classList.remove('on');});
    p.classList.add('selected'); p.querySelector('.radio').classList.add('on');
  }));
</script>
</body>
</html>
